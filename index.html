<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>킹덤 가디언즈: 오버로드</title>
    <style>
        * { box-sizing: border-box; -webkit-user-select: none; user-select: none; }
        body {
            margin: 0; padding: 0; background-color: #050508; color: #e2e2e9;
            font-family: -apple-system, BlinkMacSystemFont, 'Malgun Gothic', sans-serif;
            display: flex; flex-direction: column; align-items: center; width: 100vw; height: 100vh; overflow: hidden;
        }
        #top-bar {
            width: 100%; max-width: 500px; padding: 12px 16px; display: flex; justify-content: space-between;
            align-items: center; background-color: #0f0f1a; border-bottom: 2px solid #222235; z-index: 10;
        }
        .info-item { font-size: 14px; font-weight: bold; display: flex; align-items: center; gap: 4px; }
        .gold { color: #ffd700; } .wave { color: #b088ff; } .hp { color: #ff4d4d; }

        #viewport {
            position: relative; flex: 1; width: 100%; max-width: 500px;
            background-color: #0a0e0b; overflow: auto; 
            scroll-behavior: smooth; -webkit-overflow-scrolling: touch;
        }
        #scroll-container {
            position: relative; width: 900px; height: 1400px;
            background-color: #0d120e;
        }
        canvas { position: absolute; top: 0; left: 0; z-index: 1; width: 100%; height: 100%; pointer-events: none; }
        
        /* ✨ 타워 슬롯 디자인 가시성 상향 */
        .tower-slot {
            position: absolute; width: 44px; height: 44px; background-color: rgba(255, 183, 77, 0.15);
            border: 2px solid #ffb74d; border-radius: 50%; z-index: 5; transform: translate(-50%, -50%);
            display: flex; justify-content: center; align-items: center; font-size: 10px; color: #fff; cursor: pointer;
            font-weight: bold; text-align: center; line-height: 1.1; box-shadow: 0 0 8px rgba(255,183,77,0.3);
        }

        .unit-container {
            position: absolute; transform: translate(-50%, -50%);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10;
        }
        .hp-bar { width: 24px; height: 3px; background-color: #411; border: 1px solid #000; margin-bottom: 2px; }
        .hp-fill { width: 100%; height: 100%; background-color: #3f3; }
        
        .ally-graphic { width: 15px; height: 15px; border: 1px solid #fff; border-radius: 3px; background: #3498db; box-shadow: 0 0 6px #3498db; }
        .ally-graphic.archer { border-radius: 50%; background: #2ecc71; box-shadow: 0 0 6px #2ecc71; }
        .ally-graphic.wizard { transform: rotate(45deg); background: #9b59b6; box-shadow: 0 0 6px #9b59b6; }

        .mobile-modal {
            display: none; position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 500px; background-color: rgba(10, 10, 18, 0.96);
            border-top: 3px solid #ffd700; border-radius: 16px 16px 0 0; padding: 16px; z-index: 100;
        }
        .modal-title { font-size: 14px; font-weight: bold; color: #ffd700; margin-bottom: 12px; text-align: center; }
        .grid-menu { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; max-height: 240px; overflow-y: auto; }
        
        .menu-btn {
            background-color: #1a1a2e; color: white; border: 1px solid #333; padding: 12px 4px;
            font-size: 11px; font-weight: bold; border-radius: 8px; display: flex; flex-direction: column;
            align-items: center; gap: 4px; text-align: center; cursor: pointer;
        }
        .menu-btn span { font-size: 10px; color: #ffb74d; }
        .menu-desc { font-size: 9px; color: #aaa; font-weight: normal; line-height: 1.2; }

        #control-panel {
            width: 100%; max-width: 500px; background-color: #0f0f1a; padding: 12px;
            display: flex; gap: 8px; border-top: 2px solid #222235; z-index: 10;
        }
        .action-btn {
            flex: 1; background: linear-gradient(to bottom, #2980b9, #1f618d); color: white;
            border: none; padding: 14px 0; font-size: 13px; font-weight: bold; border-radius: 8px;
            display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer;
        }
        #btn-wave-start { background: linear-gradient(to bottom, #d35400, #a04000); }
        .action-btn:disabled { background: #222 !important; color: #555; }

        #game-over {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.9); z-index: 200; flex-direction: column; justify-content: center; align-items: center;
        }
    </style>
</head>
<body>

    <div id="top-bar">
        <div class="info-item gold">💰 <span id="txt-gold">1500</span></div>
        <div class="info-item hp">❤️ <span id="txt-hp">600/600</span></div>
        <div class="info-item wave">🌊 Wave <span id="txt-wave">1</span></div>
    </div>
    
    <div id="viewport">
        <div id="scroll-container">
            <canvas id="game-canvas"></canvas>
            
            <div class="tower-slot" style="left: 140px; top: 140px;" data-idx="0">🔨</div>
            <div class="tower-slot" style="left: 240px; top: 140px;" data-idx="1">🔨</div>
            <div class="tower-slot" style="left: 410px; top: 140px;" data-idx="2">🔨</div>
            <div class="tower-slot" style="left: 420px; top: 260px;" data-idx="3">🔨</div>
            <div class="tower-slot" style="left: 710px; top: 140px;" data-idx="4">🔨</div>
            <div class="tower-slot" style="left: 710px; top: 240px;" data-idx="5">🔨</div>
            
            <div class="tower-slot" style="left: 180px; top: 460px;" data-idx="6">🔨</div>
            <div class="tower-slot" style="left: 320px; top: 460px;" data-idx="7">🔨</div>
            <div class="tower-slot" style="left: 480px; top: 460px;" data-idx="8">🔨</div>
            <div class="tower-slot" style="left: 620px; top: 460px;" data-idx="9">🔨</div>
            <div class="tower-slot" style="left: 760px; top: 460px;" data-idx="10">🔨</div>
            
            <div class="tower-slot" style="left: 170px; top: 600px;" data-idx="11">🔨</div>
            <div class="tower-slot" style="left: 220px; top: 760px;" data-idx="12">🔨</div>
            <div class="tower-slot" style="left: 410px; top: 760px;" data-idx="13">🔨</div>
            <div class="tower-slot" style="left: 540px; top: 760px;" data-idx="14">🔨</div>
            <div class="tower-slot" style="left: 740px; top: 760px;" data-idx="15">🔨</div>
            <div class="tower-slot" style="left: 740px; top: 880px;" data-idx="16">🔨</div>

            <div class="tower-slot" style="left: 200px; top: 1040px;" data-idx="17">🔨</div>
            <div class="tower-slot" style="left: 420px; top: 1040px;" data-idx="18">🔨</div>
            <div class="tower-slot" style="left: 550px; top: 1040px;" data-idx="19">🔨</div>
            <div class="tower-slot" style="left: 750px; top: 1040px;" data-idx="20">🔨</div>
            <div class="tower-slot" style="left: 160px; top: 1260px;" data-idx="21">🔨</div>
            <div class="tower-slot" style="left: 310px; top: 1260px;" data-idx="22">🔨</div>
            <div class="tower-slot" style="left: 460px; top: 1260px;" data-idx="23">🔨</div>
            <div class="tower-slot" style="left: 610px; top: 1260px;" data-idx="24">🔨</div>
        </div>
    </div>

    <div id="modal-build" class="mobile-modal">
        <div class="modal-title">🔨 가디언 디펜스 타워 스카우트</div>
        <div class="grid-menu" id="build-options"></div>
    </div>

    <div id="modal-spawn" class="mobile-modal">
        <div class="modal-title">⚔️ 훈련소 병력 전선 급파 명령</div>
        <div class="grid-menu">
            <div class="menu-btn" onclick="spawnAlly('knight', 1, 60)">🛡️ 정예 성기사<br>(1인) <span>60G</span></div>
            <div class="menu-btn" onclick="spawnAlly('archer', 1, 80)">🏹 정예 보병궁수<br>(1인) <span>80G</span></div>
            <div class="menu-btn" onclick="spawnAlly('wizard', 1, 120)">🔮 원소 대마도사<br>(1인) <span>120G</span></div>
            <div class="menu-btn" style="border-color: #3498db;" onclick="spawnAlly('knight', 6, 280)">⚔️ 성기사 수호분대<br>(6인) <span>280G</span></div>
            <div class="menu-btn" style="border-color: #2ecc71;" onclick="spawnAlly('archer', 6, 360)">🎯 궁수 저격분대<br>(6인) <span>360G</span></div>
            <div class="menu-btn" style="border-color: #9b59b6;" onclick="spawnAlly('wizard', 6, 550)">🔥 마도 결계분대<br>(6인) <span>550G</span></div>
        </div>
    </div>

    <div id="control-panel">
        <button id="btn-open-spawn" class="action-btn" onclick="document.getElementById('modal-spawn').style.display='block'">⚔️ 병력 소환</button>
        <button id="btn-upgrade-castle" class="action-btn" onclick="upgradeCastle()">🏰 성문 보강<span id="lbl-castle-cost">200G</span></button>
        <button id="btn-wave-start" class="action-btn" onclick="startWave()">🔥 웨이브 개시</button>
    </div>

    <div id="game-over">
        <h2 style="color: #ff3333; font-size: 36px; margin: 0;">Castle Fallen</h2>
        <button class="action-btn" style="width: 180px; flex: none;" onclick="location.reload()">재시작</button>
    </div>

    <script>
        const cvs = document.getElementById('game-canvas');
        const ctx = cvs.getContext('2d');
        const viewport = document.getElementById('viewport');
        const scrollContainer = document.getElementById('scroll-container');
        
        const mapW = 900; const mapH = 1400;
        cvs.width = mapW; cvs.height = mapH;

        const roadPath = [
            {x: 0, y: 220}, {x: 320, y: 220}, {x: 320, y: 70}, {x: 820, y: 70},
            {x: 820, y: 380}, {x: 100, y: 380}, {x: 100, y: 680}, {x: 620, y: 680},
            {x: 620, y: 950}, {x: 850, y: 950}, {x: 850, y: 1200}, {x: 70, y: 1200},
            {x: 70, y: 1350}, {x: 900, y: 1350}
        ];

        const gameState = {
            gold: 1500, wave: 1, isWaveActive: false,
            castleHp: 600, castleMaxHp: 600, castleUpCost: 200,
            towers: Array(25).fill(null), selectedSlotIdx: null,
            specs: {
                basic:  { name: "초소 궁수탑", cost: 70,  range: 160, cooldown: 500,  damage: 15, color: "#7f8c8d", desc: "기본 원거리 순찰탑" },
                heavy:  { name: "화염 거포탑", cost: 160, range: 140, cooldown: 1600, damage: 85, color: "#e74c3c", desc: "광역 화염 스플래시" },
                crit:   { name: "발리스타 탑", cost: 180, range: 150, cooldown: 450,  damage: 25, color: "#f1c40f", desc: "4배 치명타 일격 쇠뇌" },
                sniper: { name: "마법 저격탑", cost: 220, range: 330, cooldown: 2200, damage: 145, color: "#2ecc71", desc: "초장거리 마력 저격포" },
                laser:  { name: "에테르 광선", cost: 260, range: 190, cooldown: 120,  damage: 6,  color: "#9b59b6", desc: "직선 궤도 전범위 관통" },
                poison: { name: "역병 가스탑", cost: 150, range: 145, cooldown: 800,  damage: 12, color: "#1abc9c", desc: "치명적 중독 지속 도트" },
                buffer: { name: "전쟁 토템탑", cost: 200, range: 130, cooldown: 9999, damage: 0,  color: "#e67e22", desc: "주변 타워 공속 +30%" },
                chain:  { name: "연쇄 번개탑", cost: 280, range: 180, cooldown: 1100, damage: 48, color: "#3498db", desc: "동시 3인 전류 토크" },
                shred:  { name: "구조 파괴탑", cost: 210, range: 150, cooldown: 900,  damage: 32, color: "#e84393", desc: "피격 대상 방어력 영구-5" }
            }
        };

        let enemies = []; let allies = []; let projectiles = []; let particles = [];

        // ✨ 더욱 화려하고 커진 파티클 스파크 연산 로직
        function spawnParticles(x, y, color, count=16, speedMult=1.5, sizeMult=1.5) {
            for(let i=0; i<count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = (Math.random() * 4 + 2) * speedMult;
                particles.push({
                    x: x, y: y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
                    radius: (Math.random() * 4 + 2) * sizeMult, color: color, alpha: 1, decay: Math.random() * 0.03 + 0.015
                });
            }
        }

        function drawGame() {
            ctx.fillStyle = "#0a0d0b"; ctx.fillRect(0, 0, mapW, mapH);

            ctx.strokeStyle = '#161f17'; ctx.lineWidth = 46; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
            ctx.beginPath(); ctx.moveTo(roadPath[0].x, roadPath[0].y);
            for(let i=1; i<roadPath.length; i++) ctx.lineTo(roadPath[i].x, roadPath[i].y);
            ctx.stroke();
            ctx.strokeStyle = '#223226'; ctx.lineWidth = 32; ctx.stroke();

            ctx.fillStyle = "#e74c3c"; ctx.fillRect(870, 1310, 30, 80);

            gameState.towers.forEach(t => {
                if(!t) return;
                ctx.fillStyle = t.color; ctx.beginPath(); ctx.arc(t.x, t.y, 18, 0, Math.PI*2); ctx.fill();
                // 네온 글로우 효과 부여
                ctx.shadowColor = t.color; ctx.shadowBlur = 10;
                ctx.fillStyle = "#fff"; ctx.font = "bold 9px sans-serif"; ctx.textAlign = "center";
                ctx.fillText(`Lv.${t.level}`, t.x, t.y - 22);
                ctx.fillText(t.name.slice(0,4), t.x, t.y + 4);
                ctx.shadowBlur = 0; // 이펙트 초기화
            });

            // ✨ 투사체 가시성 향상 렌더링
            projectiles.forEach(p => {
                ctx.shadowColor = p.color; ctx.shadowBlur = 12;
                ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2); ctx.fill();
                ctx.shadowBlur = 0;
            });

            for(let i = particles.length - 1; i >= 0; i--) {
                const pt = particles[i]; pt.x += pt.vx; pt.y += pt.vy; pt.alpha -= pt.decay;
                if(pt.alpha <= 0) { particles.splice(i, 1); continue; }
                ctx.save(); ctx.globalAlpha = pt.alpha;
                ctx.shadowColor = pt.color; ctx.shadowBlur = 6;
                ctx.fillStyle = pt.color;
                ctx.beginPath(); ctx.arc(pt.x, pt.y, pt.radius, 0, Math.PI*2); ctx.fill(); ctx.restore();
            }
        }

        document.querySelectorAll('.tower-slot').forEach(slot => {
            slot.addEventListener('click', () => {
                if(gameState.isWaveActive) return;
                const idx = parseInt(slot.getAttribute('data-idx'));
                gameState.selectedSlotIdx = idx;
                openBuildModal(idx);
            });
        });

        function openBuildModal(idx) {
            const t = gameState.towers[idx]; const menu = document.getElementById('build-options');
            menu.innerHTML = '';
            if(!t) {
                for(let key in gameState.specs) {
                    const spec = gameState.specs[key];
                    menu.innerHTML += `<div class="menu-btn" onclick="buildTower('${key}')">${spec.name} <span>${spec.cost}G</span><div class="menu-desc">${spec.desc}</div></div>`;
                }
            } else {
                if(t.level >= 100) {
                    menu.innerHTML = `<div class="menu-btn" style="grid-column:span 3;">👑 최고 등급 달성</div>`;
                } else {
                    const cost = t.level * 60 + 50;
                    menu.innerHTML = `<div class="menu-btn" style="grid-column:span 3; width:100%;" onclick="upgradeTower(${idx})">🔼 강화 (Lv.${t.level} -> Lv.${t.level+1}) <span>${cost}G</span></div>`;
                }
            }
            document.getElementById('modal-build').style.display = 'block';
            document.getElementById('modal-spawn').style.display = 'none';
        }

        function buildTower(type) {
            const spec = gameState.specs[type]; const idx = gameState.selectedSlotIdx;
            if(gameState.gold >= spec.cost) {
                gameState.gold -= spec.cost;
                const slotEl = document.querySelector(`.tower-slot[data-idx='${idx}']`);
                const tx = parseInt(slotEl.style.left); const ty = parseInt(slotEl.style.top);

                gameState.towers[idx] = {
                    type: type, name: spec.name, x: tx, y: ty, level: 1, damage: spec.damage,
                    range: spec.range, cooldown: spec.cooldown, color: spec.color, lastShot: 0
                };
                slotEl.style.background = spec.color; slotEl.style.color = "#fff"; slotEl.innerHTML = spec.name.slice(0,2);
                spawnParticles(tx, ty, spec.color, 35, 2, 1.5); updateUI();
            }
            document.getElementById('modal-build').style.display = 'none';
        }

        function upgradeTower(idx) {
            const t = gameState.towers[idx]; const cost = t.level * 60 + 50;
            if(gameState.gold >= cost && t.level < 100) {
                gameState.gold -= cost; t.level++;
                t.damage = Math.floor(t.damage * 1.38);
                t.range = Math.floor(t.range * 1.02);
                if(t.cooldown > 110) t.cooldown -= 15;
                spawnParticles(t.x, t.y, "#ffd700", 40, 2.5, 1.8); updateUI();
            }
            document.getElementById('modal-build').style.display = 'none';
        }

        function spawnAlly(type, count, totalCost) {
            if(gameState.gold < totalCost) return;
            gameState.gold -= totalCost; updateUI();

            const baseIdx = roadPath.length - 1;
            const baseX = roadPath[baseIdx].x;
            const baseY = roadPath[baseIdx].y;

            for(let i = 0; i < count; i++) {
                let hp = 100; let range = 26; let damage = 22;
                if(type === 'archer') { hp = 60; range = 140; damage = 14; }
                if(type === 'wizard') { hp = 65; range = 120; damage = 32; }

                const offsetX = count === 1 ? 0 : (Math.random() * 34 - 17);
                const offsetY = count === 1 ? 0 : (Math.random() * 44 - i * 14);

                const container = document.createElement('div'); container.className = 'unit-container';
                container.style.left = `${baseX + offsetX}px`; container.style.top = `${baseY + offsetY}px`;
                
                const hpBar = document.createElement('div'); hpBar.className = 'hp-bar';
                const hpFill = document.createElement('div'); hpFill.className = 'hp-fill';
                hpBar.appendChild(hpFill);
                const body = document.createElement('div'); body.className = `ally-graphic ${type}`;
                container.appendChild(hpBar); container.appendChild(body); scrollContainer.appendChild(container);

                allies.push({
                    element: container, hpFill: hpFill, type: type, hp: hp, maxHp: hp, range: range, damage: damage, lastAttack: 0,
                    pathIndex: baseIdx, currentX: baseX + offsetX, currentY: baseY + offsetY, offsetX: offsetX, offsetY: offsetY
                });
            }
            document.getElementById('modal-spawn').style.display = 'none';
        }

        function startWave() {
            if(gameState.isWaveActive) return; gameState.isWaveActive = true; updateUI();
            let count = 8 + gameState.wave * 3; let spawned = 0;
            const powerMult = Math.pow(1.48, gameState.wave - 1);

            const spawner = setInterval(() => {
                if(spawned >= count) { clearInterval(spawner); return; }
                
                let type = 'normal'; let hp = 45 * powerMult; let armor = 2 * gameState.wave;
                let speed = 1.3; let size = 12; let color = "#e74c3c"; let gold = 15 + gameState.wave*3;

                const rand = Math.random();
                if(rand < 0.18) {
                    type = 'armor'; hp *= 2.5; armor *= 3; speed = 0.8; size = 17; color = "#7f8c8d";
                } else if(rand >= 0.18 && rand < 0.35) {
                    type = 'rush'; hp *= 0.6; armor = 0; speed = 2.4; size = 10; color = "#e67e22";
                } else if(rand >= 0.35 && rand < 0.50) {
                    type = 'air'; hp *= 0.8; color = "#5dade2";
                } else if(rand >= 0.50 && rand < 0.65) {
                    type = 'split'; hp *= 1.3; color = "#27ae60"; size = 14;
                } else if(rand >= 0.65 && rand < 0.78) { 
                    type = 'debuffer'; hp *= 1.2; color = "#d63031"; size = 13;
                } else if(rand >= 0.78 && rand < 0.90) { 
                    type = 'regen'; hp *= 1.5; color = "#ffeaa7"; size = 14;
                } else if(gameState.wave % 5 === 0 && spawned === 0) {
                    type = 'boss'; hp *= 8; armor *= 4; speed = 0.6; size = 26; color = "#922b21"; gold *= 6;
                }

                const container = document.createElement('div'); container.className = 'unit-container';
                container.style.left = `${roadPath[0].x}px`; container.style.top = `${roadPath[0].y}px`;
                const hpBar = document.createElement('div'); hpBar.className = 'hp-bar';
                const hpFill = document.createElement('div'); hpFill.className = 'hp-fill';
                hpBar.appendChild(hpFill);
                const body = document.createElement('div'); body.className = 'ally-graphic'; 
                body.style.backgroundColor = color; body.style.borderRadius = "50%"; body.style.width = `${size}px`; body.style.height = `${size}px`;
                container.appendChild(hpBar); container.appendChild(body); scrollContainer.appendChild(container);

                enemies.push({
                    element: container, hpFill: hpFill, type: type, hp: hp, maxHp: hp, baseArmor: armor, armor: armor,
                    speed: speed, size: size, color: color, gold: Math.floor(gold),
                    currentX: roadPath[0].x, currentY: roadPath[0].y, pathIndex: 0, poisonTick: 0
                });
                spawned++;
            }, 600);
        }

        function handleCombat(currentTime) {
            const bufferTowers = gameState.towers.filter(t => t && t.type === 'buffer');

            gameState.towers.forEach(t => {
                if(!t || t.type === 'buffer') return;
                
                let currentCd = t.cooldown;
                bufferTowers.forEach(b => {
                    if(Math.sqrt((b.x-t.x)**2 + (b.y-t.y)**2) <= b.range) currentCd *= 0.7;
                });

                if(currentTime - t.lastShot < currentCd) return;

                let target = null;
                for(let e of enemies) {
                    if(t.type === 'heavy' && e.type === 'air') continue;
                    const d = Math.sqrt((e.currentX-t.x)**2 + (e.currentY-t.y)**2);
                    if(d <= t.range) { target = e; break; }
                }

                if(target) {
                    if(t.type === 'laser') {
                        // ✨ 에테르 일직선 레이저 이펙트 화려하게 두께 확장
                        ctx.strokeStyle = "rgba(163, 102, 255, 0.9)"; ctx.lineWidth = 7;
                        ctx.beginPath(); ctx.moveTo(t.x, t.y); ctx.lineTo(target.currentX, target.currentY); ctx.stroke();
                        enemies.forEach(e => {
                            if(Math.sqrt((e.currentX-target.currentX)**2 + (e.currentY-target.currentY)**2) < 55) {
                                e.hp -= Math.max(1, t.damage - e.armor); updateMonsterHp(e);
                            }
                        });
                    } else if(t.type === 'chain') { 
                        let chainTargets = [target];
                        for(let e of enemies) {
                            if(e !== target && Math.sqrt((e.currentX-target.currentX)**2 + (e.currentY-target.currentY)**2) < 100) {
                                chainTargets.push(e); if(chainTargets.length >= 3) break;
                            }
                        }
                        chainTargets.forEach((ct, idx) => {
                            ct.hp -= Math.max(1, Math.floor(t.damage * (1 - idx*0.18) - ct.armor)); updateMonsterHp(ct);
                            // 전격 스파크 잔상 파티클 생성
                            spawnParticles(ct.currentX, ct.currentY, t.color, 12, 1.2, 1.2);
                        });
                    } else {
                        projectiles.push({
                            x: t.x, y: t.y, target: target, type: t.type, damage: t.damage,
                            speed: 13, radius: t.type==='heavy'?9:5, color: t.color
                        });
                    }
                    t.lastShot = currentTime;
                }
            });

            for(let i=projectiles.length-1; i>=0; i--) {
                const p = projectiles[i];
                if(!enemies.includes(p.target)) { p.element?.remove(); projectiles.splice(i,1); continue; }

                const dx = p.target.currentX - p.x; const dy = p.target.currentY - p.y; const dist = Math.sqrt(dx*dx + dy*dy);
                if(dist < 14) {
                    let dmg = p.damage;
                    if(p.type === 'crit' && Math.random() < 0.25) { dmg *= 4; spawnParticles(p.target.currentX, p.target.currentY, "#f1c40f", 35, 3, 2); }
                    if(p.type === 'poison') p.target.poisonTick = 5;
                    if(p.type === 'shred') p.target.armor = Math.max(0, p.target.armor - 5);

                    if(p.type === 'heavy') {
                        // 화염 대폭발 이펙트
                        spawnParticles(p.target.currentX, p.target.currentY, "#ff5722", 30, 2.5, 2);
                        enemies.forEach(e => {
                            if(Math.sqrt((e.currentX-p.target.currentX)**2 + (e.currentY-p.target.currentY)**2) < 75) {
                                e.hp -= Math.max(1, p.damage - e.armor); updateMonsterHp(e);
                            }
                        });
                    } else {
                        p.target.hp -= Math.max(1, dmg - p.target.armor); 
                        spawnParticles(p.target.currentX, p.target.currentY, p.color, 14, 1.2, 1.1);
                        updateMonsterHp(p.target);
                    }
                    projectiles.splice(i, 1);
                } else {
                    p.x += (dx/dist)*p.speed; p.y += (dy/dist)*p.speed;
                }
            }
        }

        function updateMonsterHp(enemy) {
            if(enemy.hp <= 0) {
                if(enemy.type === 'split') {
                    for(let k=0; k<2; k++) {
                        const container = document.createElement('div'); container.className = 'unit-container';
                        container.style.left = `${enemy.currentX}px`; container.style.top = `${enemy.currentY}px`;
                        const hpBar = document.createElement('div'); hpBar.className = 'hp-bar';
                        const hpFill = document.createElement('div'); hpFill.className = 'hp-fill';
                        hpBar.appendChild(hpFill);
                        const body = document.createElement('div'); body.className = 'ally-graphic'; body.style.backgroundColor = "#2ecc71"; body.style.borderRadius = "50%"; body.style.width="8px"; body.style.height="8px";
                        container.appendChild(hpBar); container.appendChild(body); scrollContainer.appendChild(container);

                        enemies.push({
                            element: container, hpFill: hpFill, type: 'normal', hp: enemy.maxHp*0.35, maxHp: enemy.maxHp*0.35, armor: 0, speed: 2.0, size: 8, color: "#2ecc71", gold: 4,
                            currentX: enemy.currentX + (k*12-6), currentY: enemy.currentY, pathIndex: enemy.pathIndex, poisonTick: 0
                        });
                    }
                }
                gameState.gold += enemy.gold; enemy.element.remove();
                const idx = enemies.indexOf(enemy); if(idx > -1) enemies.splice(idx, 1); updateUI();
            } else {
                enemy.hpFill.style.width = `${(enemy.hp / enemy.maxHp) * 100}%`;
            }
        }

        function loop(currentTime) {
            drawGame();

            // ⚔️ [요구사항 반영] 아군 부대 전투 시 멈춤 및 끝단 도달 시 소멸 제어 시스템
            for(let i = allies.length - 1; i >= 0; i--) {
                const ally = allies[i]; let engagedEnemy = null;

                // 시야 범위 내의 적 실시간 감지
                for(let e of enemies) {
                    const dist = Math.sqrt((e.currentX - ally.currentX)**2 + (e.currentY - ally.currentY)**2);
                    if(dist <= ally.range) { engagedEnemy = e; break; }
                }

                if(engagedEnemy) {
                    // 공격 쿨타임 연산 및 화려한 백색 화력 이펙트 방출
                    if(currentTime - ally.lastAttack > (ally.type==='archer'?550:950)) {
                        engagedEnemy.hp -= ally.damage; updateMonsterHp(engagedEnemy); ally.lastAttack = currentTime;
                        spawnParticles(engagedEnemy.currentX, engagedEnemy.currentY, "#ffffff", 8, 1, 0.8);
                    }
                }

                // 🛑 [수정] 모든 타입의 아군 유닛은 시야 내에 적이 감지되면 전진을 즉시 멈춥니다.
                if(!engagedEnemy) {
                    const prevPoint = roadPath[ally.pathIndex - 1];
                    if(prevPoint) {
                        const targetX = prevPoint.x + ally.offsetX; const targetY = prevPoint.y + ally.offsetY;
                        const dx = targetX - ally.currentX; const dy = targetY - ally.currentY; const d = Math.sqrt(dx*dx + dy*dy);
                        if(d <= 1.5) { ally.currentX = targetX; ally.currentY = targetY; ally.pathIndex--; }
                        else { ally.currentX += (dx / d) * 1.5; ally.currentY += (dy / d) * 1.5; }
                    } else {
                        // 🚪 [요구사항 반영] 적 스폰 지점(끝)에 닿은 아군 병력은 자연스럽게 소멸(퇴근) 처리
                        ally.element.remove();
                        allies.splice(i, 1);
                        continue;
                    }
                }

                ally.element.style.left = `${ally.currentX}px`; ally.element.style.top = `${ally.currentY}px`;
            }

            for(let i=enemies.length-1; i>=0; i--) {
                const e = enemies[i];
                if(e.poisonTick > 0) { e.hp -= (gameState.wave * 1.2); e.poisonTick -= 0.016; updateMonsterHp(e); if(e.hp<=0) continue; }
                if(e.type === 'regen' && e.hp < e.maxHp) e.hp = Math.min(e.maxHp, e.hp + 0.15);

                if(e.type === 'debuffer' && Math.random() < 0.005) {
                    allies.forEach(al => {
                        if(Math.sqrt((al.currentX-e.currentX)**2 + (al.currentY-e.currentY)**2) < 70) al.hp -= 2;
                    });
                }

                // 아군 중 근접 유닛('knight')과 부딪히면 몬스터 측도 이동 차단 판정
                let isBlocked = false;
                for(let ally of allies) {
                    if(ally.type === 'knight' && Math.sqrt((ally.currentX - e.currentX)**2 + (ally.currentY - e.currentY)**2) < 20) {
                        isBlocked = true;
                        ally.hp -= 0.35; ally.hpFill.style.width = `${(ally.hp/ally.maxHp)*100}%`;
                        if(ally.hp <= 0) { ally.element.remove(); allies.splice(allies.indexOf(ally), 1); }
                        break;
                    }
                }
                if(isBlocked) { e.hpFill.style.width = `${(e.hp / e.maxHp) * 100}%`; continue; }

                const next = roadPath[e.pathIndex + 1];
                if(!next) {
                    gameState.castleHp -= (e.type === 'boss' ? 180 : 30); e.element.remove(); enemies.splice(i, 1); updateUI();
                    if(gameState.castleHp <= 0) { endGame(); return; } continue;
                }

                const dx = next.x - e.currentX; const dy = next.y - e.currentY; const d = Math.sqrt(dx*dx + dy*dy);
                if(d <= e.speed) { e.currentX = next.x; e.currentY = next.y; e.pathIndex++; }
                else { e.currentX += (dx/d)*e.speed; e.currentY += (dy/d)*e.speed; }

                e.element.style.left = `${e.currentX}px`; e.element.style.top = `${e.currentY}px`;
                e.hpFill.style.width = `${(e.hp / e.maxHp) * 100}%`;
            }

            handleCombat(currentTime);

            if(gameState.isWaveActive && enemies.length === 0) {
                gameState.isWaveActive = false; gameState.gold += 220 + (gameState.wave * 40); gameState.wave++; updateUI();
            }

            requestAnimationFrame(loop);
        }

        function updateUI() {
            document.getElementById('txt-gold').innerText = gameState.gold;
            document.getElementById('txt-hp').innerText = `${Math.max(0, Math.floor(gameState.castleHp))}/${gameState.castleMaxHp}`;
            document.getElementById('txt-wave').innerText = gameState.wave;
            document.getElementById('lbl-castle-cost').innerText = `${gameState.castleUpCost}G`;
            document.getElementById('btn-upgrade-castle').disabled = gameState.gold < gameState.castleUpCost;
            document.getElementById('btn-wave-start').disabled = gameState.isWaveActive;
        }

        function upgradeCastle() {
            if(gameState.gold >= gameState.castleUpCost) {
                gameState.gold -= gameState.castleUpCost; gameState.castleMaxHp += 150;
                gameState.castleHp = gameState.castleMaxHp; gameState.castleUpCost = Math.floor(gameState.castleUpCost * 1.5);
                updateUI();
            }
        }

        function endGame() { document.getElementById('game-over').style.display = 'flex'; }
        viewport.addEventListener('click', (e) => { if(!e.target.closest('.tower-slot') && !e.target.closest('.action-btn')) { document.getElementById('modal-build').style.display='none'; document.getElementById('modal-spawn').style.display='none'; } });

        updateUI(); requestAnimationFrame(loop);
    </script>
</body>
