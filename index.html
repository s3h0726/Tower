<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>킹덤 가디언즈: 모바일 워</title>
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #0f0f13; color: #e0e0e6;
            font-family: 'Malgun Gothic', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            user-select: none; overflow: hidden;
            -webkit-tap-highlight-color: transparent; /* 모바일 터치 하이라이트 제거 */
        }

        /* 스마트폰 화면 비율에 맞춘 상단 헤더 */
        #header-area {
            width: 100%; max-width: 480px;
            padding: 8px 0; text-align: center;
        }
        h2 { margin: 2px 0; font-size: 18px; color: #ffd700; }
        #instruction { color: #8a8a93; font-size: 11px; }

        /* 모바일용 뷰포트 (세로형 스마트폰 최적화 레이아웃) */
        #viewport {
            position: relative;
            width: 100vw; height: 60vh;
            max-width: 480px; max-height: 500px;
            border: 3px solid #3a2f28; border-radius: 8px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            overflow: hidden; background-color: #1a1e1a;
        }

        /* 드래그 가능한 거대 전장 (1200x1200) */
        #game-world {
            position: absolute;
            width: 1200px; height: 1200px;
            left: -350px; top: -350px; /* 초기 맵 중앙 배치 */
        }

        canvas { position: absolute; top: 0; left: 0; z-index: 1; }
        .game-element { position: absolute; z-index: 2; }

        /* 메인 아군 성 */
        #castle {
            left: 1020px; top: 1020px;
            width: 80px; height: 100px;
            background: linear-gradient(135deg, #4b525d, #2c3037);
            border: 2px solid #111; border-radius: 6px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        #castle-hp-bar { position: absolute; top: -18px; width: 80px; height: 8px; background-color: #441111; border: 1px solid #000; }
        #castle-hp-fill { width: 100%; height: 100%; background: linear-gradient(to right, #ff3333, #33ff33); }

        /* 모바일 터치에 최적화된 길 바로 옆 타워 슬롯 (크기를 키워 터치 미스 방지) */
        .tower-slot {
            position: absolute; width: 44px; height: 44px;
            background-color: rgba(255, 215, 0, 0.05); border: 2px solid #9a7b56;
            border-radius: 50%; cursor: pointer; z-index: 3;
            display: flex; justify-content: center; align-items: center; font-size: 18px; color: #ffd700;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

        /* 타워 아이콘 디자인 */
        .tower {
            width: 100%; height: 100%; border: 2px solid #111; border-radius: 50%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            font-size: 10px; font-weight: bold; color: #fff; box-sizing: border-box;
        }
        .tower.arrow { background: #2e4d36; }
        .tower.magic { background: #362e4d; }
        .tower.cannon { background: #4d2e2e; }
        .tower.ice { background: #2e474d; }
        .tower.poison { background: #434d2e; }
        .tower.laser { background: #592352; }
        .tower.buff { background: #615014; }

        /* 캐릭터 개체 스타일 */
        .enemy-container, .ally-container {
            position: absolute; transform: translate(-50%, -100%);
            display: flex; flex-direction: column; align-items: center; justify-content: flex-end; z-index: 10;
        }
        .hp-bar { width: 100%; height: 3px; background-color: #551111; border: 1px solid #000; margin-bottom: 2px; }
        .hp-fill { width: 100%; height: 100%; background-color: #00ff33; }
        
        .enemy-body { background: radial-gradient(circle, #ff6666, #aa0000); border: 1.5px solid #111; border-radius: 50%; }
        .enemy-body.boss { background: radial-gradient(circle, #ff33cc, #660044); border: 2px solid #ffd700; }

        .ally-body { border: 1.5px solid #111; }
        .ally-body.knight { width: 18px; height: 18px; background: #3498db; border-radius: 4px; }
        .ally-body.archer { width: 16px; height: 16px; background: #2ecc71; border-radius: 50%; }
        .ally-body.wizard { width: 16px; height: 16px; background: #9b59b6; border-radius: 4px; transform: rotate(45deg); }

        .projectile { position: absolute; border-radius: 50%; transform: translate(-50%, -50%); z-index: 9; pointer-events: none; }
        .projectile.arrow { background-color: #fff; width: 5px; height: 5px; }
        .projectile.magic { background-color: #bd88ff; width: 8px; height: 8px; }
        .projectile.cannon { background-color: #ff5500; width: 12px; height: 12px; }
        .projectile.ice { background-color: #88eeff; width: 7px; height: 7px; }
        .projectile.poison { background-color: #88ff88; width: 7px; height: 7px; }
        .projectile.laser { background-color: #ff33aa; width: 5px; height: 14px; }

        /* 스마트폰 터치 전용 큼직한 선택 팝업 */
        #build-menu, #spawn-menu {
            display: none; position: absolute; background-color: rgba(15, 15, 20, 0.98);
            border: 2px solid #ffd700; border-radius: 10px; padding: 5px; gap: 5px; z-index: 100;
            flex-direction: column; box-shadow: 0 10px 25px rgba(0,0,0,0.6);
            width: 130px;
        }
        .menu-btn {
            background-color: #2a2a35; color: white; border: 1px solid #444;
            padding: 8px 10px; font-size: 12px; cursor: pointer; border-radius: 6px;
            display: flex; justify-content: space-between; font-weight: bold;
        }
        
        /* 모바일 하단 고정 컨트롤러 및 상태창 */
        #ui-panel {
            width: 100%; max-width: 480px; box-sizing: border-box;
            background: linear-gradient(to bottom, #21212a, #111115);
            padding: 10px 15px; display: flex; flex-direction: column; gap: 8px;
            border: 3px solid #3a2f28; border-top: none; border-radius: 0 0 8px 8px;
        }
        .stats-row { display: flex; justify-content: space-between; width: 100%; }
        .stats-box { display: flex; gap: 15px; font-size: 15px; font-weight: bold; background: rgba(0,0,0,0.3); padding: 6px 12px; border-radius: 6px; width: 100%; justify-content: space-around; }
        .control-row { display: flex; width: 100%; gap: 6px; }
        .btn {
            flex: 1; background: linear-gradient(to bottom, #4caf50, #2e7d32); color: white; border: 1px solid #111;
            padding: 10px 0; font-size: 12px; font-weight: bold; border-radius: 6px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 2px 0 #1b5e20;
        }
        .btn span { font-size: 9px; color: #ccc; margin-top: 1px; }
        .btn:disabled { background: #333 !important; color: #666; box-shadow: none; }
        #btn-start { background: linear-gradient(to bottom, #ff9800, #f57c00); box-shadow: 0 2px 0 #e65100; }
        #btn-ally-menu { background: linear-gradient(to bottom, #2196f3, #0b7dda); box-shadow: 0 2px 0 #0d47a1; }

        #game-over-screen {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.9); justify-content: center; align-items: center; flex-direction: column; z-index: 200;
        }
    </style>
</head>
<body>

    <div id="header-area">
        <h2>🏰 킹덤 가디언즈: 모바일</h2>
        <div id="instruction">📱 화면을 드래그하여 지도 이동 / 슬롯을 터치하여 타워 건설</div>
    </div>
    
    <div id="viewport">
        <div id="game-world">
            <canvas id="bg-canvas" width="1200" height="1200"></canvas>

            <div id="castle" class="game-element">
                <div id="castle-hp-bar"><div id="castle-hp-fill"></div></div>
                <span style="font-weight: bold; font-size: 11px; color: #ccc;">CASTLE</span>
                <span id="castle-lv-txt" style="font-size: 10px; color: #ffd700; margin-top: 2px;">Lv.1</span>
            </div>
            
            <div id="slot-0" class="tower-slot game-element" style="left: 100px; top: 95px;" onclick="openBuildMenu(event, 0)">+</div>
            <div id="slot-1" class="tower-slot game-element" style="left: 250px; top: 95px;" onclick="openBuildMenu(event, 1)">+</div>
            
            <div id="slot-2" class="tower-slot game-element" style="left: 355px; top: 220px;" onclick="openBuildMenu(event, 2)">+</div>
            <div id="slot-3" class="tower-slot game-element" style="left: 355px; top: 380px;" onclick="openBuildMenu(event, 3)">+</div>
            
            <div id="slot-4" class="tower-slot game-element" style="left: 200px; top: 555px;" onclick="openBuildMenu(event, 4)">+</div>
            
            <div id="slot-5" class="tower-slot game-element" style="left: 45px; top: 720px;" onclick="openBuildMenu(event, 5)">+</div>
            
            <div id="slot-6" class="tower-slot game-element" style="left: 250px; top: 845px;" onclick="openBuildMenu(event, 6)">+</div>
            <div id="slot-7" class="tower-slot game-element" style="left: 480px; top: 845px;" onclick="openBuildMenu(event, 7)">+</div>
            
            <div id="slot-8" class="tower-slot game-element" style="left: 655px; top: 680px;" onclick="openBuildMenu(event, 8)">+</div>
            <div id="slot-9" class="tower-slot game-element" style="left: 655px; top: 480px;" onclick="openBuildMenu(event, 9)">+</div>
            
            <div id="slot-10" class="tower-slot game-element" style="left: 800px; top: 245px;" onclick="openBuildMenu(event, 10)">+</div>
            <div id="slot-11" class="tower-slot game-element" style="left: 1005px; top: 125px;" onclick="openBuildMenu(event, 11)">+</div>
            
            <div id="slot-12" class="tower-slot game-element" style="left: 955px; top: 650px;" onclick="openBuildMenu(event, 12)">+</div>
            <div id="slot-13" class="tower-slot game-element" style="left: 955px; top: 850px;" onclick="openBuildMenu(event, 13)">+</div>

            <div id="build-menu" class="game-element">
                <button class="menu-btn" onclick="buildTower('arrow')">🏹 화살 <span>100G</span></button>
                <button class="menu-btn" onclick="buildTower('magic')">🔮 마법 <span>150G</span></button>
                <button class="menu-btn" onclick="buildTower('cannon')">💣 캐논 <span>200G</span></button>
                <button class="menu-btn" onclick="buildTower('ice')">❄️ 얼음 <span>120G</span></button>
                <button class="menu-btn" onclick="buildTower('poison')">🧪 독형 <span>140G</span></button>
                <button class="menu-btn" onclick="buildTower('laser')">⚡ 레이저 <span>250G</span></button>
                <button class="menu-btn" onclick="buildTower('buff')">👑 신단 <span>300G</span></button>
            </div>

            <div id="spawn-menu" class="game-element">
                <button class="menu-btn" onclick="spawnAlly('knight')">🛡️ 기사 <span>50G</span></button>
                <button class="menu-btn" onclick="spawnAlly('archer')">🏹 궁수 <span>70G</span></button>
                <button class="menu-btn" onclick="spawnAlly('wizard')">🔮 법사 <span>100G</span></button>
            </div>
        </div>

        <div id="game-over-screen">
            <h2 style="color: #ff3333; font-size: 28px; margin: 0;">GAME OVER</h2>
            <p id="final-wave" style="font-size: 15px; color: #aaa; margin: 10px 0 20px 0;">최종 방어: Wave 1</p>
            <button class="btn" style="padding: 8px 30px; flex:none; width:150px;" onclick="location.reload()">다시 시작</button>
        </div>
    </div>

    <div id="ui-panel">
        <div class="stats-row">
            <div class="stats-box">
                <div>💰 <span id="gold-txt" style="color:#ffd700;">450</span></div>
                <div>❤️ <span id="hp-txt">400/400</span></div>
                <div>🌊 <span id="wave-txt" style="color:#bb88ff;">1</span></div>
            </div>
        </div>
        
        <div class="control-row">
            <button id="btn-ally-menu" class="btn" onclick="openAllyMenu(event)">
                ⚔️ 군사 출격
                <span>부대 고용</span>
            </button>
            <button id="btn-up-castle" class="btn" onclick="upgradeCastle()">
                🏰 성벽 보강
                <span id="cost-castle">120G</span>
            </button>
            <button id="btn-start" class="btn" onclick="startWave()">
                🔥 웨이브 시작
            </button>
        </div>
    </div>

    <script>
        // --- 1. 길 바로 옆 슬롯 시스템 구축을 위한 격자형 로드 맵 패스 ---
        const roadPath = [
            {x: 0, y: 150}, {x: 300, y: 150}, {x: 300, y: 500}, {x: 100, y: 500},
            {x: 100, y: 800}, {x: 600, y: 800}, {x: 600, y: 400}, {x: 450, y: 400},
            {x: 450, y: 50}, {x: 950, y: 50}, {x: 950, y: 300}, {x: 750, y: 300},
            {x: 750, y: 600}, {x: 1020, y: 600}, {x: 1020, y: 1050}
        ];

        const gameState = {
            gold: 450, wave: 1, isWaveActive: false,
            castleHp: 400, castleMaxHp: 400, castleLevel: 1, castleUpCost: 120,
            towers: Array(14).fill(null), selectedSlotIndex: null,
            towerSpecs: {
                arrow:  { name: "화살", cost: 100, range: 120, cooldown: 450,  damage: 13 },
                magic:  { name: "마법", cost: 150, range: 150, cooldown: 1100, damage: 45 },
                cannon: { name: "캐논", cost: 200, range: 100, cooldown: 1700, damage: 70, splash: 55 },
                ice:    { name: "얼음", cost: 120, range: 110, cooldown: 800,  damage: 11, effect: 'slow' },
                poison: { name: "독",   cost: 140, range: 110, cooldown: 900,  damage: 7,  effect: 'poison' },
                laser:  { name: "레이저", cost: 250, range: 130, cooldown: 200,  damage: 8 },
                buff:   { name: "신단", cost: 300, range: 140, cooldown: 99999, damage: 0, effect: 'buff' }
            }
        };

        const enemies = []; const allies = []; const projectiles = [];
        const viewport = document.getElementById('viewport');
        const gameWorld = document.getElementById('game-world');
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');

        // --- 2. 모바일 터치 및 마우스 하이브리드 드래그 제어 장치 ---
        let isDragging = false; let startX, startY;

        const startDrag = (clientX, clientY) => {
            isDragging = true;
            startX = clientX - gameWorld.offsetLeft;
            startY = clientY - gameWorld.offsetTop;
        };

        const moveDrag = (clientX, clientY) => {
            if (!isDragging) return;
            let left = clientX - startX; let top = clientY - startY;
            left = Math.min(0, Math.max(left, viewport.clientWidth - 1200));
            top = Math.min(0, Math.max(top, viewport.clientHeight - 1200));
            gameWorld.style.left = `${left}px`; gameWorld.style.top = `${top}px`;
        };

        // 마우스 이벤트 바인딩
        viewport.addEventListener('mousedown', (e) => {
            if(e.target.closest('button') || e.target.closest('.tower-slot')) return;
            startDrag(e.clientX, e.clientY);
        });
        window.addEventListener('mousemove', (e) => moveDrag(e.clientX, e.clientY));
        window.addEventListener('mouseup', () => isDragging = false);

        // 모바일 터치(Touch) 이벤트 바인딩 추가
        viewport.addEventListener('touchstart', (e) => {
            if(e.target.closest('button') || e.target.closest('.tower-slot')) return;
            const touch = e.touches[0];
            startDrag(touch.clientX, touch.clientY);
        });
        viewport.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            moveDrag(touch.clientX, touch.clientY);
        });
        viewport.addEventListener('touchend', () => isDragging = false);


        function drawBackground() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#32251a'; ctx.lineWidth = 36; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
            ctx.beginPath(); ctx.moveTo(roadPath[0].x, roadPath[0].y);
            for(let i = 1; i < roadPath.length; i++) ctx.lineTo(roadPath[i].x, roadPath[i].y);
            ctx.stroke();
            ctx.strokeStyle = '#5a4533'; ctx.lineWidth = 26; ctx.stroke();
        }

        function updateUI() {
            document.getElementById('gold-txt').innerText = gameState.gold;
            document.getElementById('hp-txt').innerText = `${Math.max(0, Math.floor(gameState.castleHp))}/${gameState.castleMaxHp}`;
            document.getElementById('wave-txt').innerText = gameState.wave;
            document.getElementById('cost-castle').innerText = `${gameState.castleUpCost}G`;
            document.getElementById('castle-lv-txt').innerText = `Lv.${gameState.castleLevel}`;

            document.getElementById('btn-up-castle').disabled = gameState.gold < gameState.castleUpCost || gameState.isWaveActive;
            document.getElementById('btn-start').disabled = gameState.isWaveActive;
            document.getElementById('castle-hp-fill').style.width = `${(gameState.castleHp / gameState.castleMaxHp) * 100}%`;

            for(let i = 0; i < 14; i++) {
                const slotEl = document.getElementById(`slot-${i}`);
                if(!slotEl) continue;
                const t = gameState.towers[i];
                if(t === null) slotEl.innerHTML = "+";
                else slotEl.innerHTML = `<div class="tower ${t.type}">${t.name}</div>`;
            }
        }

        function openBuildMenu(e, slotIndex) {
            e.stopPropagation(); if(gameState.isWaveActive) return;
            if(gameState.towers[slotIndex] !== null) { upgradeExistingTower(slotIndex); return; }
            gameState.selectedSlotIndex = slotIndex;
            const menu = document.getElementById('build-menu');
            menu.style.display = 'flex'; menu.style.left = `${e.pageX - gameWorld.getBoundingClientRect().left - 50}px`; menu.style.top = `${e.pageY - gameWorld.getBoundingClientRect().top - 120}px`;
            document.getElementById('spawn-menu').style.display = 'none';
        }

        function openAllyMenu(e) {
            e.stopPropagation(); const menu = document.getElementById('spawn-menu');
            menu.style.display = 'flex'; menu.style.left = "930px"; menu.style.top = "930px";
            document.getElementById('build-menu').style.display = 'none';
        }

        function closeAllMenus() {
            document.getElementById('build-menu').style.display = 'none';
            document.getElementById('spawn-menu').style.display = 'none';
        }
        document.body.addEventListener('click', closeAllMenus);
        viewport.addEventListener('touchstart', closeAllMenus);

        function buildTower(type) {
            const idx = gameState.selectedSlotIndex; const spec = gameState.towerSpecs[type];
            if(idx !== null && gameState.gold >= spec.cost) {
                gameState.gold -= spec.cost; const slotEl = document.getElementById(`slot-${idx}`);
                gameState.towers[idx] = {
                    type: type, name: spec.name, x: slotEl.offsetLeft + 22, y: slotEl.offsetTop + 22,
                    level: 1, damage: spec.damage, range: spec.range, cooldown: spec.cooldown,
                    splash: spec.splash || 0, effect: spec.effect || null, lastShot: 0
                };
                updateUI();
            }
        }

        function upgradeExistingTower(idx) {
            const t = gameState.towers[idx]; const upCost = t.level * 90;
            if(gameState.gold >= upCost) {
                gameState.gold -= upCost; t.level++; t.damage = Math.floor(t.damage * 1.5); t.range += 8; updateUI();
            }
        }

        function upgradeCastle() {
            if(gameState.gold >= gameState.castleUpCost && !gameState.isWaveActive) {
                gameState.gold -= gameState.castleUpCost; gameState.castleLevel++;
                gameState.castleMaxHp += 120; gameState.castleHp = gameState.castleMaxHp;
                gameState.castleUpCost = Math.floor(gameState.castleUpCost * 1.5); updateUI();
            }
        }

        function spawnAlly(type) {
            let cost = 50; let hp = 70; let speed = 1.3; let range = 25; let damage = 15; let cd = 900;
            if(type === 'archer') { cost = 70; hp = 45; speed = 1.5; range = 120; damage = 10; cd = 600; }
            if(type === 'wizard') { cost = 100; hp = 50; speed = 1.1; range = 95; damage = 24; cd = 1200; }

            if(gameState.gold < cost) return;
            gameState.gold -= cost; updateUI();

            const container = document.createElement('div'); container.className = 'ally-container';
            container.style.width = '20px'; container.style.height = '30px';
            const hpBar = document.createElement('div'); hpBar.className = 'hp-bar';
            const hpFill = document.createElement('div'); hpFill.className = 'hp-fill';
            hpBar.appendChild(hpFill);
            const body = document.createElement('div'); body.className = `ally-body ${type}`;
            container.appendChild(hpBar); container.appendChild(body); gameWorld.appendChild(container);

            allies.push({
                element: container, hpFill: hpFill, type: type, hp: hp, maxHp: hp,
                speed: speed, range: range, damage: damage, cooldown: cd, lastAttack: 0,
                pathIndex: roadPath.length - 1, currentX: roadPath[roadPath.length-1].x, currentY: roadPath[roadPath.length-1].y
            });
        }

        function startWave() {
            if(gameState.isWaveActive) return; gameState.isWaveActive = true; updateUI();
            const isBossWave = (gameState.wave % 5 === 0);
            const spawnCount = isBossWave ? 1 : 10 + gameState.wave * 3;

            let spawned = 0;
            const spawner = setInterval(() => {
                if(spawned >= spawnCount) { clearInterval(spawner); return; }
                
                let type = 'normal'; let hp = 60 + gameState.wave * 25; let size = 18;
                let speed = 1.2 + (gameState.wave * 0.04); let gold = 15 + gameState.wave * 3;

                if (isBossWave) {
                    type = 'boss'; hp = (120 + gameState.wave * 50) * 6; size = 34; speed = 0.6; gold = 150 + gameState.wave * 30;
                } else if (Math.random() < 0.25) {
                    type = 'fast'; hp = Math.floor(hp * 0.5); size = 14; speed *= 1.5;
                } else if (Math.random() < 0.2) {
                    type = 'heavy'; hp = Math.floor(hp * 2.2); size = 24; speed *= 0.65; gold *= 2;
                }

                spawnEnemy(type, hp, speed, size, gold); spawned++;
            }, isBossWave ? 1000 : 700);
        }

        function spawnEnemy(type, hp, speed, size, gold) {
            const container = document.createElement('div'); container.className = 'enemy-container';
            container.style.width = `${size}px`; container.style.height = `${size + 12}px`;
            const hpBar = document.createElement('div'); hpBar.className = 'hp-bar';
            const hpFill = document.createElement('div'); hpFill.className = 'hp-fill';
            hpBar.appendChild(hpFill);
            const body = document.createElement('div'); body.className = `enemy-body ${type === 'boss' ? 'boss' : ''}`;
            body.style.width = `${size}px`; body.style.height = `${size}px`;
            container.appendChild(hpBar); container.appendChild(body); gameWorld.appendChild(container);

            enemies.push({
                element: container, hpFill: hpFill, type: type, hp: hp, maxHp: hp, gold: gold, baseSpeed: speed, speed: speed,
                pathIndex: 0, currentX: roadPath[0].x, currentY: roadPath[0].y, slowDuration: 0, poisonDuration: 0, poisonDamage: 0
            });
        }

        function handleTowerFire(currentTime) {
            const buffTowers = gameState.towers.filter(t => t && t.type === 'buff');

            for(let tower of gameState.towers) {
                if(!tower || tower.type === 'buff') continue;
                let isBuffed = false;
                for(let bt of buffTowers) {
                    if(Math.sqrt(Math.pow(bt.x - tower.x, 2) + Math.pow(bt.y - tower.y, 2)) <= bt.range) { isBuffed = true; break; }
                }
                const currentDamage = isBuffed ? Math.floor(tower.damage * 1.5) : tower.damage;
                if(currentTime - tower.lastShot < tower.cooldown) continue;

                let target = null;
                for(let enemy of enemies) {
                    if(Math.sqrt(Math.pow(enemy.currentX - tower.x, 2) + Math.pow(enemy.currentY - tower.y, 2)) <= tower.range) { target = enemy; break; }
                }
                if(target) {
                    fireProjectile(tower, target, currentDamage);
                    tower.lastShot = currentTime;
                }
            }
        }

        function fireProjectile(tower, target, dmg) {
            const el = document.createElement('div'); el.className = `projectile ${tower.type}`;
            el.style.left = `${tower.x}px`; el.style.top = `${tower.y}px`; gameWorld.appendChild(el);
            projectiles.push({
                element: el, type: tower.type, x: tower.x, y: tower.y, target: target,
                damage: dmg, splash: tower.splash, effect: tower.effect, speed: tower.type === 'laser' ? 14 : 8
            });
        }

        function mainLoop(currentTime) {
            drawBackground();

            for(let i = allies.length - 1; i >= 0; i--) {
                const ally = allies[i]; let targetEnemy = null;
                for(let enemy of enemies) {
                    if(Math.sqrt(Math.pow(enemy.currentX - ally.currentX, 2) + Math.pow(enemy.currentY - ally.currentY, 2)) <= ally.range) { targetEnemy = enemy; break; }
                }
                if(targetEnemy) {
                    if(currentTime - ally.lastAttack > ally.cooldown) {
                        targetEnemy.hp -= ally.damage; updateMonsterHp(targetEnemy); ally.lastAttack = currentTime;
                        if(ally.type !== 'knight') {
                            const pEl = document.createElement('div'); pEl.className = `projectile ${ally.type === 'archer' ? 'arrow' : 'magic'}`;
                            pEl.style.left = `${ally.currentX}px`; pEl.style.top = `${ally.currentY}px`; gameWorld.appendChild(pEl);
                            setTimeout(() => pEl.remove(), 120);
                        }
                    }
                }
                if(!targetEnemy || ally.type !== 'knight') {
                    const prevPoint = roadPath[ally.pathIndex - 1];
                    if(prevPoint) {
                        const dx = prevPoint.x - ally.currentX; const dy = prevPoint.y - ally.currentY; const dist = Math.sqrt(dx*dx + dy*dy);
                        if(dist <= ally.speed) { ally.currentX = prevPoint.x; ally.currentY = prevPoint.y; ally.pathIndex--; }
                        else { ally.currentX += (dx / dist) * ally.speed; ally.currentY += (dy / dist) * ally.speed; }
                    }
                }
                ally.element.style.left = `${ally.currentX}px`; ally.element.style.top = `${ally.currentY}px`;
            }

            for(let i = enemies.length - 1; i >= 0; i--) {
                const enemy = enemies[i];
                if(enemy.slowDuration > 0) { enemy.slowDuration -= 16; enemy.speed = enemy.baseSpeed * 0.45; } else { enemy.speed = enemy.baseSpeed; }
                if(enemy.poisonDuration > 0) { enemy.poisonDuration -= 16; enemy.hp -= enemy.poisonDamage; updateMonsterHp(enemy); if(enemy.hp <= 0) continue; }

                let blocked = false;
                for(let ally of allies) {
                    if(ally.type === 'knight' && Math.abs(ally.currentX - enemy.currentX) < 18 && Math.abs(ally.currentY - enemy.currentY) < 18) {
                        blocked = true;
                        if(Math.random() < 0.015) {
                            ally.hp -= (enemy.type === 'boss' ? 10 : 3);
                            ally.hpFill.style.width = `${(ally.hp / ally.maxHp) * 100}%`;
                            if(ally.hp <= 0) { ally.element.remove(); allies.splice(allies.indexOf(ally), 1); }
                        }
                        break;
                    }
                }
                if(blocked) continue;

                const nextPoint = roadPath[enemy.pathIndex + 1];
                if(!nextPoint) {
                    gameState.castleHp -= (enemy.type === 'boss' ? 200 : 25 + gameState.wave * 4);
                    enemy.element.remove(); enemies.splice(i, 1); updateUI();
                    if(gameState.castleHp <= 0) { endGame(); return; } continue;
                }

                const dx = nextPoint.x - enemy.currentX; const dy = nextPoint.y - enemy.currentY; const dist = Math.sqrt(dx*dx + dy*dy);
                if(dist <= enemy.speed) { enemy.currentX = nextPoint.x; enemy.currentY = nextPoint.y; enemy.pathIndex++; }
                else { enemy.currentX += (dx / dist) * enemy.speed; enemy.currentY += (dy / dist) * enemy.speed; }
                enemy.element.style.left = `${enemy.currentX}px`; enemy.element.style.top = `${enemy.currentY}px`;
            }

            for(let i = projectiles.length - 1; i >= 0; i--) {
                const p = projectiles[i];
                if(!enemies.includes(p.target)) { p.element.remove(); projectiles.splice(i, 1); continue; }
                const dx = p.target.currentX - p.x; const dy = p.target.currentY - p.y; const dist = Math.sqrt(dx*dx + dy*dy);

                if(dist < 10) {
                    if(p.splash > 0) {
                        for(let targetEnv of enemies) {
                            if(Math.sqrt(Math.pow(targetEnv.currentX - p.x, 2) + Math.pow(targetEnv.currentY - p.y, 2)) <= p.splash) {
                                targetEnv.hp -= p.damage; applyStatusEffect(targetEnv, p.effect, p.damage); updateMonsterHp(targetEnv);
                            }
                        }
                    } else {
                        p.target.hp -= p.damage; applyStatusEffect(p.target, p.effect, p.damage); updateMonsterHp(p.target);
                    }
                    p.element.remove(); projectiles.splice(i, 1);
                } else {
                    p.x += (dx / dist) * p.speed; p.y += (dy / dist) * p.speed;
                    p.element.style.left = `${p.x}px`; p.element.style.top = `${p.y}px`;
                }
            }

            if (gameState.isWaveActive && enemies.length === 0 && document.querySelectorAll('.enemy-container').length === 0) {
                gameState.isWaveActive = false; gameState.gold += 180 + (gameState.wave * 25); gameState.wave++; updateUI();
            }
            requestAnimationFrame(mainLoop);
        }

        function applyStatusEffect(enemy, effect, damage) {
            if(effect === 'slow') enemy.slowDuration = 2000;
            if(effect === 'poison') { enemy.poisonDuration = 3500; enemy.poisonDamage = Math.ceil(damage * 0.06); }
        }

        function updateMonsterHp(enemy) {
            if(!enemies.includes(enemy)) return;
            enemy.hpFill.style.width = `${(enemy.hp / enemy.maxHp) * 100}%`;
            if(enemy.hp <= 0) {
                gameState.gold += enemy.gold; enemy.element.remove();
                enemies.splice(enemies.indexOf(enemy), 1); updateUI();
            }
        }

        function endGame() {
            document.getElementById('game-over-screen').style.display = 'flex';
            document.getElementById('final-wave').innerText = `최종 방어: Wave ${gameState.wave}`;
        }

        updateUI(); requestAnimationFrame(mainLoop);
    </script>
</body>
