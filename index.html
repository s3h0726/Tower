<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>킹덤 가디언즈: 모바일 마스터</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-user-select: none; user-select: none;
            -webkit-touch-callout: none;
        }
        body {
            margin: 0; padding: 0; background-color: #0d0d11; color: #e2e2e9;
            font-family: -apple-system, BlinkMacSystemFont, 'Malgun Gothic', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
            width: 100vw; height: 100vh; overflow: hidden;
            touch-action: none; /* 브라우저 기본 스크롤/줌 방지 */
        }

        /* 모바일 상단 미니 전광판 */
        #top-bar {
            width: 100%; max-width: 480px; padding: 8px 12px;
            display: flex; justify-content: space-between; align-items: center;
            background-color: #16161f; border-bottom: 2px solid #2d2d3a; z-index: 10;
        }
        .info-item { font-size: 14px; font-weight: bold; display: flex; align-items: center; gap: 4px; }
        .gold { color: #ffd700; } .wave { color: #b088ff; }

        /* 모바일 전체 화면 뷰포트 (남은 세로 공간 모두 활용) */
        #viewport {
            position: relative; flex: 1; width: 100%; max-width: 480px;
            background-color: #141815; overflow: hidden;
        }

        /* 터치 드래그용 월드 맵 (1000x1000 피셀 축소 최적화) */
        #game-world {
            position: absolute; width: 1000px; height: 1000px;
            left: -300px; top: -300px;
            will-change: transform;
        }
        canvas { position: absolute; top: 0; left: 0; z-index: 1; pointer-events: none; }
        .game-element { position: absolute; z-index: 2; }

        /* 본성 기지 */
        #castle {
            left: 820px; top: 820px; width: 80px; height: 100px;
            background: linear-gradient(135deg, #444b54, #23272d);
            border: 2px solid #111; border-radius: 6px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        #castle-hp-bar { position: absolute; top: -14px; width: 70px; height: 6px; background: #311; border: 1px solid #000; }
        #castle-hp-fill { width: 100%; height: 100%; background: #3f3; }

        /* 모바일 터치 전용 원형 대형 슬롯 (길 바로 옆) */
        .tower-slot {
            position: absolute; width: 46px; height: 46px;
            background-color: rgba(255, 215, 0, 0.08); border: 2px dashed #b89368;
            border-radius: 50%; z-index: 3;
            display: flex; justify-content: center; align-items: center;
            font-size: 16px; font-weight: bold; color: #ffd700;
        }

        /* 타워 아이콘 및 레벨 뱃지 */
        .tower {
            width: 100%; height: 100%; border: 2px solid #111; border-radius: 50%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            font-size: 10px; font-weight: bold; color: #fff; position: relative;
        }
        .tower.arrow { background: #2b4733; } .tower.magic { background: #352b47; } .tower.cannon { background: #472b2b; }
        .tower-lv {
            position: absolute; right: -4px; top: -4px; background: #ff9800;
            color: #000; font-size: 9px; width: 14px; height: 14px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
        }

        /* 유닛 레이아웃 */
        .enemy-container, .ally-container {
            position: absolute; transform: translate(-50%, -100%);
            display: flex; flex-direction: column; align-items: center; justify-content: flex-end; z-index: 10;
        }
        .hp-bar { width: 100%; height: 3px; background-color: #411; border: 1px solid #000; margin-bottom: 2px; }
        .hp-fill { width: 100%; height: 100%; background-color: #3f3; }
        .enemy-body { background: radial-gradient(circle, #ff5555, #990000); border: 1px solid #111; border-radius: 50%; }
        .enemy-body.boss { background: radial-gradient(circle, #ff33cc, #550033); border: 2px solid #ffd700; }
        .ally-body { border: 1px solid #111; }
        .ally-body.knight { width: 16px; height: 16px; background: #2980b9; border-radius: 3px; }
        .ally-body.archer { width: 14px; height: 14px; background: #27ae60; border-radius: 50%; }
        .ally-body.wizard { width: 14px; height: 14px; background: #8e44ad; transform: rotate(45deg); }

        .projectile { position: absolute; border-radius: 50%; transform: translate(-50%, -50%); z-index: 9; pointer-events: none; }
        .projectile.arrow { background-color: #fff; width: 4px; height: 4px; }
        .projectile.magic { background-color: #c090ff; width: 7px; height: 7px; }
        .projectile.cannon { background-color: #ff6600; width: 10px; height: 10px; }

        /* 하단 팝업 시트형 모달 UI (모바일용 편리한 배치) */
        .mobile-modal {
            display: none; position: absolute; bottom: 0; left: 0; width: 100%;
            background-color: rgba(18, 18, 24, 0.96); border-top: 3px solid #ffd700;
            border-radius: 16px 16px 0 0; padding: 16px; z-index: 100;
            animation: slideUp 0.2s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .modal-title { font-size: 14px; font-weight: bold; color: #ffd700; margin-bottom: 10px; text-align: center; }
        .grid-menu { display: grid; grid-template-columns: repeat(3, 110px); gap: 8px; justify-content: center; }
        
        .menu-btn {
            background-color: #252535; color: white; border: 1px solid #444;
            padding: 10px 6px; font-size: 11px; font-weight: bold; cursor: pointer; border-radius: 8px;
            display: flex; flex-direction: column; align-items: center; gap: 4px;
        }
        .menu-btn span { font-size: 10px; color: #ffb74d; }
        .menu-desc { font-size: 9px; color: #aaa; text-align: center; font-weight: normal; margin-top: 2px; }

        /* 모바일 대형 하단 조작 바 */
        #control-panel {
            width: 100%; max-width: 480px; background-color: #16161f;
            padding: 12px; display: flex; gap: 8px; border-top: 2px solid #2d2d3a; z-index: 10;
        }
        .action-btn {
            flex: 1; background: linear-gradient(to bottom, #3498db, #2980b9);
            color: white; border: none; padding: 12px 0; font-size: 13px; font-weight: bold;
            border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .action-btn span { font-size: 10px; color: #d0e0ff; margin-top: 2px; }
        #btn-wave-start { background: linear-gradient(to bottom, #e67e22, #d35400); }
        .action-btn:disabled { background: #2c2c35 !important; color: #666; }
        .action-btn:disabled span { color: #555; }

        #game-over {
            display: none; position: absolute; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.9); z-index: 200; flex-direction: column; justify-content: center; align-items: center;
        }
    </style>
</head>
<body>

    <div id="top-bar">
        <div class="info-item gold">💰 <span id="txt-gold">400</span></div>
        <div class="info-item">❤️ <span id="txt-hp">400/400</span></div>
        <div class="info-item wave">🌊 Wave <span id="txt-wave">1</span></div>
    </div>
    
    <div id="viewport">
        <div id="game-world">
            <canvas id="bg-canvas" width="1000" height="1000"></canvas>

            <div id="castle" class="game-element">
                <div id="castle-hp-bar"><div id="castle-hp-fill"></div></div>
                <span style="font-weight: bold; font-size: 11px; color: #ccc;">성문</span>
            </div>
            
            <div id="slot-0" class="tower-slot game-element" style="left: 100px; top: 75px;">+</div>
            <div id="slot-1" class="tower-slot game-element" style="left: 230px; top: 75px;">+</div>
            <div id="slot-2" class="tower-slot game-element" style="left: 355px; top: 180px;">+</div>
            <div id="slot-3" class="tower-slot game-element" style="left: 195px; top: 355px;">+</div>
            <div id="slot-4" class="tower-slot game-element" style="left: 45px; top: 480px;">+</div>
            <div id="slot-5" class="tower-slot game-element" style="left: 250px; top: 655px;">+</div>
            <div id="slot-6" class="tower-slot game-element" style="left: 455px; top: 655px;">+</div>
            <div id="slot-7" class="tower-slot game-element" style="left: 655px; top: 500px;">+</div>
            <div id="slot-8" class="tower-slot game-element" style="left: 655px; top: 300px;">+</div>
            <div id="slot-9" class="tower-slot game-element" style="left: 855px; top: 650px;">+</div>

            <div id="modal-build" class="mobile-modal">
                <div class="modal-title">🔨 타워 건설 및 업그레이드</div>
                <div class="grid-menu" id="build-options">
                    </div>
            </div>

            <div id="modal-spawn" class="mobile-modal">
                <div class="modal-title">⚔️ 군사 소환 부대 지정</div>
                <div class="grid-menu">
                    <button class="menu-btn" onclick="spawnAlly('knight')">🛡️ 기사 <span>50G</span><div class="menu-desc">적을 길막함</div></button>
                    <button class="menu-btn" onclick="spawnAlly('archer')">🏹 궁수 <span>70G</span><div class="menu-desc">원거리 사격</div></button>
                    <button class="menu-btn" onclick="spawnAlly('wizard')">🔮 법사 <span>100G</span><div class="menu-desc">강력한 한방</div></button>
                </div>
            </div>
        </div>

        <div id="game-over">
            <h2 style="color: #ff3333; font-size: 32px; margin: 0;">🏰 함락됨</h2>
            <p id="txt-final-wave" style="font-size: 16px; color: #bbb; margin: 10px 0 20px 0;">최종 방어: Wave 1</p>
            <button class="action-btn" style="width: 160px; flex: none;" onclick="location.reload()">재도전</button>
        </div>
    </div>

    <div id="control-panel">
        <button id="btn-open-spawn" class="action-btn">⚔️ 군사 소환<span>용병단 배치</span></button>
        <button id="btn-upgrade-castle" class="action-btn" onclick="upgradeCastle()">🏰 성벽 보강<span id="lbl-castle-cost">120G</span></button>
        <button id="btn-wave-start" class="action-btn" onclick="startWave()">🔥 웨이브 시작</button>
    </div>

    <script>
        // --- 모바일 경로 좌표계 (1000x1000 지도용) ---
        const roadPath = [
            {x: 0, y: 130}, {x: 300, y: 130}, {x: 300, y: 410}, {x: 100, y: 410},
            {x: 100, y: 600}, {x: 600, y: 600}, {x: 600, y: 240}, {x: 800, y: 240},
            {x: 800, y: 870}, {x: 820, y: 870}
        ];

        const gameState = {
            gold: 400, wave: 1, isWaveActive: false,
            castleHp: 400, castleMaxHp: 400, castleLevel: 1, castleUpCost: 120,
            towers: Array(10).fill(null), selectedSlotIdx: null,
            // 🌟 타워 타입별 레벨 달성 시 해금되는 추가 능력치 설계 정의
            towerSpecs: {
                arrow:  { name: "화살", cost: 100, range: 110, cooldown: 450,  damage: 12, bonuses: { 2: "치명타 25%", 3: "사거리 +30" } },
                magic:  { name: "마법", cost: 150, range: 130, cooldown: 1100, damage: 45, bonuses: { 2: "적 둔화 30%", 3: "위력 대폭발" } },
                cannon: { name: "캐논", cost: 200, range: 90,  cooldown: 1800, damage: 75, splash: 50, bonuses: { 2: "범위 넓힘", 3: "기절 유발" } }
            }
        };

        const enemies = []; const allies = []; const projectiles = [];
        const viewport = document.getElementById('viewport');
        const gameWorld = document.getElementById('game-world');
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');

        // --- 1. 모바일 100% 대응 완벽 터치 스크롤 드래그 엔진 ---
        let isDragging = false; let startX, startY;
        const onStart = (cX, cY) => { isDragging = true; startX = cX - gameWorld.offsetLeft; startY = cY - gameWorld.offsetTop; };
        const onMove = (cX, cY) => {
            if (!isDragging) return;
            let left = cX - startX; let top = cY - startY;
            left = Math.min(0, Math.max(left, viewport.clientWidth - 1000));
            top = Math.min(0, Math.max(top, viewport.clientHeight - 1000));
            gameWorld.style.left = `${left}px`; gameWorld.style.top = `${top}px`;
        };
        viewport.addEventListener('mousedown', (e) => { if(e.target.closest('.tower-slot') || e.target.closest('button')) return; onStart(e.clientX, e.clientY); });
        window.addEventListener('mousemove', (e) => onMove(e.clientX, e.clientY));
        window.addEventListener('mouseup', () => isDragging = false);
        viewport.addEventListener('touchstart', (e) => { if(e.target.closest('.tower-slot') || e.target.closest('button')) return; onStart(e.touches[0].clientX, e.touches[0].clientY); });
        viewport.addEventListener('touchmove', (e) => onMove(e.touches[0].clientX, e.touches[0].clientY));
        viewport.addEventListener('touchend', () => isDragging = false);

        function drawBackground() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#2d2218'; ctx.lineWidth = 34; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
            ctx.beginPath(); ctx.moveTo(roadPath[0].x, roadPath[0].y);
            for(let i = 1; i < roadPath.length; i++) ctx.lineTo(roadPath[i].x, roadPath[i].y);
            ctx.stroke();
            ctx.strokeStyle = '#524030'; ctx.lineWidth = 24; ctx.stroke();
        }

        function updateUI() {
            document.getElementById('txt-gold').innerText = gameState.gold;
            document.getElementById('txt-hp').innerText = `${Math.max(0, Math.floor(gameState.castleHp))}/${gameState.castleMaxHp}`;
            document.getElementById('txt-wave').innerText = gameState.wave;
            document.getElementById('lbl-castle-cost').innerText = `${gameState.castleUpCost}G`;
            document.getElementById('btn-upgrade-castle').disabled = gameState.gold < gameState.castleUpCost || gameState.isWaveActive;
            document.getElementById('btn-wave-start').disabled = gameState.isWaveActive;
            document.getElementById('castle-hp-fill').style.width = `${(gameState.castleHp / gameState.castleMaxHp) * 100}%`;

            for(let i = 0; i < 10; i++) {
                const slot = document.getElementById(`slot-${i}`);
                const t = gameState.towers[i];
                if(!t) slot.innerHTML = "+";
                else slot.innerHTML = `<div class="tower ${t.type}">${t.name}<div class="tower-lv">${t.level}</div></div>`;
            }
        }

        // --- 2. 동적 해금 능력을 포함한 타워 매니지먼트 시스템 ---
        document.querySelectorAll('.tower-slot').forEach((slot, idx) => {
            slot.addEventListener('click', (e) => {
                e.stopPropagation();
                if(gameState.isWaveActive) return;
                gameState.selectedSlotIdx = idx;
                
                const t = gameState.towers[idx];
                const menuOptions = document.getElementById('build-options');
                menuOptions.innerHTML = '';

                if(!t) {
                    // 미건설 상태 -> 구매 옵션 활성화
                    for(let key in gameState.towerSpecs) {
                        const spec = gameState.towerSpecs[key];
                        menuOptions.innerHTML += `
                            <button class="menu-btn" onclick="buildTower('${key}')">
                                ${spec.name} <span>${spec.cost}G</span>
                                <div class="menu-desc">Lv.2: ${spec.bonuses[2]}<br>Lv.3: ${spec.bonuses[3]}</div>
                            </button>`;
                    }
                } else {
                    // 기건설 상태 -> 업그레이드 옵션 활성화
                    const nextCost = t.level * 100;
                    const bonusInfo = gameState.towerSpecs[t.type].bonuses[t.level + 1] || "스펙 최대치 달성";
                    menuOptions.innerHTML = `
                        <button class="menu-btn" style="grid-column: span 3; width:100%;" onclick="upgradeTower(${idx})">
                            🔼 ${t.name} 강화 진행 <span>${nextCost}G</span>
                            <div class="menu-desc" style="color:#2ecc71; font-size:11px; margin-top:4px;">다음 레벨 효과 해금 예고: ${bonusInfo}</div>
                        </button>`;
                }
                
                document.getElementById('modal-build').style.display = 'block';
                document.getElementById('modal-spawn').style.display = 'none';
            });
        });

        function buildTower(type) {
            const idx = gameState.selectedSlotIdx; const spec = gameState.towerSpecs[type];
            if(gameState.gold >= spec.cost) {
                gameState.gold -= spec.cost;
                const slotEl = document.getElementById(`slot-${idx}`);
                gameState.towers[idx] = {
                    type: type, name: spec.name, x: slotEl.offsetLeft + 23, y: slotEl.offsetTop + 23,
                    level: 1, damage: spec.damage, range: spec.range, cooldown: spec.cooldown,
                    splash: spec.splash || 0, critChance: 0, slowEff: false, stunEff: false, lastShot: 0
                };
                updateUI();
            }
            closeAllModals();
        }

        // 🌟 강화 단계별 복합 특수 조건부 개방 처리 구조
        function upgradeTower(idx) {
            const t = gameState.towers[idx]; const cost = t.level * 100;
            if(gameState.gold >= cost && t.level < 3) {
                gameState.gold -= cost; t.level++;
                t.damage = Math.floor(t.damage * 1.6);
                
                // 레벨업에 따른 고유 특수 기능 주입 분기점
                if(t.type === 'arrow') {
                    if(t.level === 2) t.critChance = 0.25; // 25% 크리티컬 해금
                    if(t.level === 3) t.range += 30;       // 사거리 추가 연장
                }
                if(t.type === 'magic') {
                    if(t.level === 2) t.slowEff = true;    // 타격 시 적 이속 제어기 주입
                    if(t.level === 3) t.damage *= 1.4;     // 마법 대폭발 위력 계수 강화
                }
                if(t.type === 'cannon') {
                    if(t.level === 2) t.splash += 25;      // 광역 폭발 범위 확장
                    if(t.level === 3) t.stunEff = true;    // 기절(스턴) CC 기능 탑재
                }
                updateUI();
            }
            closeAllModals();
        }

        document.getElementById('btn-open-spawn').addEventListener('click', (e) => {
            e.stopPropagation();
            document.getElementById('modal-spawn').style.display = 'block';
            document.getElementById('modal-build').style.display = 'none';
        });

        function closeAllModals() {
            document.getElementById('modal-build').style.display = 'none';
            document.getElementById('modal-spawn').style.display = 'none';
        }
        viewport.addEventListener('touchstart', closeAllModals);
        document.body.addEventListener('click', closeAllModals);

        function upgradeCastle() {
            if(gameState.gold >= gameState.castleUpCost && !gameState.isWaveActive) {
                gameState.gold -= gameState.castleUpCost; gameState.castleLevel++;
                gameState.castleMaxHp += 100; gameState.castleHp = gameState.castleMaxHp;
                gameState.castleUpCost = Math.floor(gameState.castleUpCost * 1.5); updateUI();
            }
        }

        function spawnAlly(type) {
            let cost = 50; let hp = 65; let speed = 1.2; let range = 22; let damage = 14; let cd = 900;
            if(type === 'archer') { cost = 70; hp = 40; speed = 1.4; range = 110; damage = 9; cd = 600; }
            if(type === 'wizard') { cost = 100; hp = 45; speed = 1.0; range = 90; damage = 22; cd = 1300; }
            if(gameState.gold < cost) return;
            gameState.gold -= cost; updateUI();

            const container = document.createElement('div'); container.className = 'ally-container';
            container.style.width = '18px'; container.style.height = '28px';
            const hpBar = document.createElement('div'); hpBar.className = 'hp-bar';
            const hpFill = document.createElement('div'); hpFill.className = 'hp-fill';
            hpBar.appendChild(hpFill);
            const body = document.createElement('div'); body.className = `ally-body ${type}`;
            container.appendChild(hpBar); container.appendChild(body); gameWorld.appendChild(container);

            allies.push({
                element: container, hpFill: hpFill, type: type, hp: hp, maxHp: hp,
                speed: speed, range: range, damage: damage, cooldown: cd, lastAttack: 0,
                pathIndex: roadPath.length - 1, currentX: roadPath[roadPath.length-1].x, currentY: roadPath[roadPath.length-1].y
            });
        }

        function startWave() {
            if(gameState.isWaveActive) return; gameState.isWaveActive = true; updateUI();
            const isBossWave = (gameState.wave % 5 === 0);
            const spawnCount = isBossWave ? 1 : 8 + gameState.wave * 2;

            let spawned = 0;
            const spawner = setInterval(() => {
                if(spawned >= spawnCount) { clearInterval(spawner); return; }
                let type = 'normal'; let hp = 50 + gameState.wave * 22; let size = 18;
                let speed = 1.2 + (gameState.wave * 0.03); let gold = 15 + gameState.wave * 2;

                if (isBossWave) {
                    type = 'boss'; hp = (100 + gameState.wave * 40) * 5; size = 32; speed = 0.6; gold = 120 + gameState.wave * 20;
                } else if (Math.random() < 0.25) {
                    type = 'fast'; hp = Math.floor(hp * 0.5); size = 14; speed *= 1.45;
                } else if (Math.random() < 0.2) {
                    type = 'heavy'; hp = Math.floor(hp * 2.0); size = 22; speed *= 0.65; gold *= 1.8;
                }
                spawnEnemy(type, hp, speed, size, gold); spawned++;
            }, 800);
        }

        function spawnEnemy(type, hp, speed, size, gold) {
            const container = document.createElement('div'); container.className = 'enemy-container';
            container.style.width = `${size}px`; container.style.height = `${size + 12}px`;
            const hpBar = document.createElement('div'); hpBar.className = 'hp-bar';
            const hpFill = document.createElement('div'); hpFill.className = 'hp-fill';
            hpBar.appendChild(hpFill);
            const body = document.createElement('div'); body.className = `enemy-body ${type === 'boss' ? 'boss' : ''}`;
            body.style.width = `${size}px`; body.style.height = `${size}px`;
            container.appendChild(hpBar); container.appendChild(body); gameWorld.appendChild(container);

            enemies.push({
                element: container, hpFill: hpFill, type: type, hp: hp, maxHp: hp, gold: gold, baseSpeed: speed, speed: speed,
                pathIndex: 0, currentX: roadPath[0].x, currentY: roadPath[0].y, slowDuration: 0, stunDuration:0
            });
        }

        function handleTowerFire(currentTime) {
            for(let tower of gameState.towers) {
                if(!tower || currentTime - tower.lastShot < tower.cooldown) continue;
                let target = null;
                for(let enemy of enemies) {
                    if(Math.sqrt(Math.pow(enemy.currentX - tower.x, 2) + Math.pow(enemy.currentY - tower.y, 2)) <= tower.range) { target = enemy; break; }
                }
                if(target) {
                    // 크리티컬 팩터 연산 적용 (화살 타워 특화)
                    let finalDmg = tower.damage;
                    if(tower.critChance > 0 && Math.random() < tower.critChance) { finalDmg *= 2; }

                    const el = document.createElement('div'); el.className = `projectile ${tower.type}`;
                    el.style.left = `${tower.x}px`; el.style.top = `${tower.y}px`; gameWorld.appendChild(el);
                    projectiles.push({
                        element: el, type: tower.type, x: tower.x, y: tower.y, target: target,
                        damage: finalDmg, splash: tower.splash, slowEff: tower.slowEff, stunEff: tower.stunEff, speed: 9
                    });
                    tower.lastShot = currentTime;
                }
            }
        }

        function mainLoop(currentTime) {
            drawBackground();

            // 아군 동역학 제어 루프
            for(let i = allies.length - 1; i >= 0; i--) {
                const ally = allies[i]; let targetEnemy = null;
                for(let enemy of enemies) {
                    if(Math.sqrt(Math.pow(enemy.currentX - ally.currentX, 2) + Math.pow(enemy.currentY - ally.currentY, 2)) <= ally.range) { targetEnemy = enemy; break; }
                }
                if(targetEnemy && currentTime - ally.lastAttack > ally.cooldown) {
                    targetEnemy.hp -= ally.damage; updateMonsterHp(targetEnemy); ally.lastAttack = currentTime;
                    if(ally.type !== 'knight') {
                        const pEl = document.createElement('div'); pEl.className = `projectile ${ally.type === 'archer' ? 'arrow' : 'magic'}`;
                        pEl.style.left = `${ally.currentX}px`; pEl.style.top = `${ally.currentY}px`; gameWorld.appendChild(pEl);
                        setTimeout(() => pEl.remove(), 100);
                    }
                }
                if(!targetEnemy || ally.type !== 'knight') {
                    const prevPoint = roadPath[ally.pathIndex - 1];
                    if(prevPoint) {
                        const dx = prevPoint.x - ally.currentX; const dy = prevPoint.y - ally.currentY; const dist = Math.sqrt(dx*dx + dy*dy);
                        if(dist <= ally.speed) { ally.currentX = prevPoint.x; ally.currentY = prevPoint.y; ally.pathIndex--; }
                        else { ally.currentX += (dx / dist) * ally.speed; ally.currentY += (dy / dist) * ally.speed; }
                    }
                }
                ally.element.style.left = `${ally.currentX}px`; ally.element.style.top = `${ally.currentY}px`;
            }

            // 적 몬스터 움직임 및 상태이상 피드백
            for(let i = enemies.length - 1; i >= 0; i--) {
                const enemy = enemies[i];
                if(enemy.stunDuration > 0) { enemy.stunDuration -= 16; continue; } // 기절 시 행동 스킵
                if(enemy.slowDuration > 0) { enemy.slowDuration -= 16; enemy.speed = enemy.baseSpeed * 0.6; } else { enemy.speed = enemy.baseSpeed; }

                let blocked = false;
                for(let ally of allies) {
                    if(ally.type === 'knight' && Math.abs(ally.currentX - enemy.currentX) < 16 && Math.abs(ally.currentY - enemy.currentY) < 16) {
                        blocked = true;
                        if(Math.random() < 0.015) {
                            ally.hp -= (enemy.type === 'boss' ? 10 : 3);
                            ally.hpFill.style.width = `${(ally.hp / ally.maxHp) * 100}%`;
                            if(ally.hp <= 0) { ally.element.remove(); allies.splice(allies.indexOf(ally), 1); }
                        }
                        break;
                    }
                }
                if(blocked) continue;

                const nextPoint = roadPath[enemy.pathIndex + 1];
                if(!nextPoint) {
                    gameState.castleHp -= (enemy.type === 'boss' ? 150 : 20);
                    enemy.element.remove(); enemies.splice(i, 1); updateUI();
                    if(gameState.castleHp <= 0) { endGame(); return; } continue;
                }
                const dx = nextPoint.x - enemy.currentX; const dy = nextPoint.y - enemy.currentY; const dist = Math.sqrt(dx*dx + dy*dy);
                if(dist <= enemy.speed) { enemy.currentX = nextPoint.x; enemy.currentY = nextPoint.y; enemy.pathIndex++; }
                else { enemy.currentX += (dx / dist) * enemy.speed; enemy.currentY += (dy / dist) * enemy.speed; }
                enemy.element.style.left = `${enemy.currentX}px`; enemy.element.style.top = `${enemy.currentY}px`;
            }

            handleTowerFire(currentTime);

            // 투사체 정밀 비행 제어
            for(let i = projectiles.length - 1; i >= 0; i--) {
                const p = projectiles[i];
                if(!enemies.includes(p.target)) { p.element.remove(); projectiles.splice(i, 1); continue; }
                const dx = p.target.currentX - p.x; const dy = p.target.currentY - p.y; const dist = Math.sqrt(dx*dx + dy*dy);

                if(dist < 10) {
                    if(p.splash > 0) {
                        for(let targetEnv of enemies) {
                            if(Math.sqrt(Math.pow(targetEnv.currentX - p.x, 2) + Math.pow(targetEnv.currentY - p.y, 2)) <= p.splash) {
                                targetEnv.hp -= p.damage; if(p.slowEff) targetEnv.slowDuration = 1800; if(p.stunEff && Math.random() < 0.3) targetEnv.stunDuration = 800; updateMonsterHp(targetEnv);
                            }
                        }
                    } else {
                        p.target.hp -= p.damage; if(p.slowEff) p.target.slowDuration = 1800; if(p.stunEff && Math.random() < 0.3) p.target.stunDuration = 800; updateMonsterHp(p.target);
                    }
                    p.element.remove(); projectiles.splice(i, 1);
                } else {
                    p.x += (dx / dist) * p.speed; p.y += (dy / dist) * p.speed;
                    p.element.style.left = `${p.x}px`; p.element.style.top = `${p.y}px`;
                }
            }

            if (gameState.isWaveActive && enemies.length === 0 && document.querySelectorAll('.enemy-container').length === 0) {
                gameState.isWaveActive = false; gameState.gold += 150 + (gameState.wave * 20); gameState.wave++; updateUI();
            }
            requestAnimationFrame(mainLoop);
        }

        function updateMonsterHp(enemy) {
            if(!enemies.includes(enemy)) return;
            enemy.hpFill.style.width = `${(enemy.hp / enemy.maxHp) * 100}%`;
            if(enemy.hp <= 0) {
                gameState.gold += enemy.gold; enemy.element.remove();
                enemies.splice(enemies.indexOf(enemy), 1); updateUI();
            }
        }

        function endGame() {
            document.getElementById('game-over').style.display = 'flex';
            document.getElementById('txt-final-wave').innerText = `최종 방어: Wave ${gameState.wave}`;
        }

        updateUI(); requestAnimationFrame(mainLoop);
    </script>
</body>
</html>
